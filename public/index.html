<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Neo Writer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <!-- marked for markdown rendering (lightweight CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- mermaid for diagram rendering -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>
  <header>
    <h1>Neo Writer</h1>
    <div id="open-story-name" style="display:inline-block; margin-left:16px; font-weight:600;"></div>
    <div id="user-info" style="position:absolute; right:16px; top:18px; font-size:0.9rem; color:#333;"></div>
  </header>

  <!-- expose local_mode and username to the client -->
  <script>
    window.local_mode = true;
    window.username = 'anonymous';
  </script>

  <main>
    <aside id="menu">
      <!-- Story list view -->
      <div class="menu-controls">
        <button id="btn-new">New</button>
        <button id="btn-refresh">Refresh</button>
      </div>
      <ul id="story-list"></ul>

      <!-- Binder view (hidden by default) -->
      <div id="binder" style="display:none;">
        <div class="binder-header">
          <button id="btn-back" class="btn-back" title="Back to stories">← Back</button>
          <span id="binder-story-name" class="binder-story-name"></span>
        </div>
        <div class="binder-section">
          <div class="binder-section-header">
            <span class="binder-section-title">Tiles</span>
            <button id="btn-add-tile" class="btn-add-tile" title="Add tile">+</button>
          </div>
          <ul id="binder-tiles-list" class="binder-list"></ul>
        </div>
        <div class="binder-section">
          <div class="binder-section-header">
            <span class="binder-section-title">Highlights</span>
            <div style="display:inline-flex;align-items:center;gap:4px;">
              <select id="highlights-sort" class="highlights-sort" title="Sort highlights">
                <option value="alpha">A→Z</option>
                <option value="most">Most</option>
                <option value="least">Least</option>
              </select>
              <button id="btn-add-highlight" class="btn-add-tile" title="Add highlight">+</button>
            </div>
          </div>
          <ul id="binder-highlights-list" class="binder-list"></ul>
        </div>
      </div>
    </aside>

    <section id="editor-pane">
      <textarea id="editor" placeholder="Start typing markdown..." spellcheck="false"></textarea>
    </section>

    <section id="render-pane">
      <div id="preview"></div>
    </section>
  </main>

  <footer>
    <div id="stats">Words: 0 — Chars: 0</div>
    <div id="current-name"></div>
  </footer>

  <!-- Custom context menu -->
  <div id="context-menu" class="context-menu" style="display:none;">
    <ul>
      <li data-action="insert-table">Insert Table</li>
      <li data-action="insert-link">Insert Link</li>
      <li data-action="insert-picture">Insert Picture</li>
      <li data-action="create-highlight">Create Highlight</li>
    </ul>
  </div>

  <!-- Insert Picture dialog -->
  <div id="picture-dialog-overlay" class="dialog-overlay" style="display:none;">
    <div class="dialog">
      <h3>Insert Picture</h3>
      <label class="dialog-label">Name (without extension):</label>
      <input type="text" id="picture-dialog-name" class="dialog-input" placeholder="e.g. my-photo" />
      <label class="dialog-label">From URL:</label>
      <input type="text" id="picture-dialog-url" class="dialog-input" placeholder="https://example.com/image.png" />
      <label class="dialog-label">Or upload from disk:</label>
      <input type="file" id="picture-dialog-file" accept="image/*" />
      <div class="dialog-buttons">
        <button id="picture-dialog-cancel" class="dialog-btn">Cancel</button>
        <button id="picture-dialog-ok" class="dialog-btn dialog-btn-primary">Insert</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
